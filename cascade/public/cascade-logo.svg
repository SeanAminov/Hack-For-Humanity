<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="signal" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
  </defs>

  <!-- Outer signal rings (emergency broadcast feel) -->
  <circle cx="256" cy="256" r="240" stroke="url(#signal)" stroke-width="4" fill="none" opacity="0.15"/>
  <circle cx="256" cy="256" r="210" stroke="url(#signal)" stroke-width="3" fill="none" opacity="0.25"/>
  <circle cx="256" cy="256" r="180" stroke="url(#signal)" stroke-width="2.5" fill="none" opacity="0.35"/>

  <!-- Shield shape (protection/emergency) -->
  <path d="M256 60 L410 140 Q420 145 420 156 L420 280 Q420 370 256 452 Q92 370 92 280 L92 156 Q92 145 102 140 Z" fill="url(#shield)" opacity="0.9"/>

  <!-- Inner shield highlight -->
  <path d="M256 90 L388 158 Q395 162 395 170 L395 272 Q395 348 256 420 Q117 348 117 272 L117 170 Q117 162 124 158 Z" fill="none" stroke="white" stroke-width="3" opacity="0.2"/>

  <!-- Location pin (center) -->
  <path d="M256 160 Q310 160 310 216 Q310 260 256 320 Q202 260 202 216 Q202 160 256 160 Z" fill="white" opacity="0.95"/>
  <circle cx="256" cy="212" r="30" fill="url(#shield)"/>

  <!-- Signal waves emanating from pin -->
  <path d="M180 200 Q168 240 180 280" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M160 185 Q142 240 160 295" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.25"/>
  <path d="M332 200 Q344 240 332 280" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M352 185 Q370 240 352 295" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- Cross/plus in the pin center (emergency/medical) -->
  <rect x="248" y="196" width="16" height="32" rx="3" fill="white"/>
  <rect x="240" y="204" width="32" height="16" rx="3" fill="white"/>
</svg>
